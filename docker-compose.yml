version: '3.8'

services:

1. Laravel Application

app:
build:
context: .
dockerfile: Dockerfile
container_name: mifx_app
restart: unless-stopped
working_dir: /var/www
volumes:
- ./:/var/www
depends_on:
- db
- redis

2. MySQL Database

db:
image: mysql:8.0
container_name: mifx_db
restart: unless-stopped
environment:
MYSQL_DATABASE: mini_trading_mifx
MYSQL_ROOT_PASSWORD: root
ports:
# Using port 33061 to avoid conflict with your local Laragon/XAMPP
- "33061:3306"

3. Redis Cache & Queue

redis:
image: redis:alpine
container_name: mifx_redis
restart: unless-stopped
ports:
# Using port 63791 to avoid conflict with your local Laragon/XAMPP
- "63791:6379"